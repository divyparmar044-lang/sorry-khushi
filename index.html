<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khushi Please Forgive Me 💖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;
overflow:hidden;
font-family:'Trebuchet MS',sans-serif;
background:linear-gradient(-45deg,#ffd1dc,#ffc0cb,#ffe4ec,#ffd6e7);
background-size:400% 400%;
animation:bg 10s ease infinite;
display:flex;
justify-content:center;
align-items:center;
}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.card{
width:90%;
max-width:500px;
background:rgba(255,255,255,.9);
padding:30px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}
h1{color:#ff4f81;margin-bottom:15px}
p{font-size:18px;color:#555;line-height:1.6}
button{
border:none;
padding:12px 24px;
border-radius:25px;
font-size:18px;
cursor:pointer;
margin:10px;
transition:.3s;
}
#yesBtn{background:#ff4f81;color:white}
#yesBtn:hover{transform:scale(1.1)}
#noBtn{background:#e0e0e0}
#msg{margin-top:15px;color:#ff4f81;font-weight:bold;min-height:30px}
.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);opacity:0}
20%{opacity:1}
100%{transform:translateY(-100px);opacity:0}
}
</style>
</head>
<body>

<div class="card">
<h1>🥺 Sorry Khushi 🥺</h1>

<p>
Dear <b>Bhatakati Aatma 👻</b><br><br>
Mujhse thodi si galti ho gayi... 😔<br>
Please gussa mat raho 🥺💖
</p>

<div style="margin-top:20px">
<button id="yesBtn">💖 Yes</button>
<button id="noBtn">😒 No</button>
</div>

<div id="msg"></div>
</div>

<script>
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(h);
}

const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const msg=document.getElementById("msg");

const texts=[
"😔 Pakka No?",
"🥺 Ek baar aur soch lo...",
"😭 Please Khushi...",
"💔 Dil toot jayega..."
];

let count=0;

noBtn.onclick=()=>{
msg.innerHTML=texts[count] || "";
noBtn.style.position="absolute";
noBtn.style.left=Math.random()*(window.innerWidth-100)+"px";
noBtn.style.top=Math.random()*(window.innerHeight-60)+"px";
count++;

if(count>=4){
setTimeout(()=>{
noBtn.remove();
msg.innerHTML="😆 Ab sirf Yes hi bacha hai!";
},700);
}
}

yesBtn.onclick=()=>{
document.body.innerHTML=`
<div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;background:linear-gradient(135deg,#ffd1dc,#ffc0cb);">
<div style="font-size:70px">🥳🎉💖</div>
<h1 style="color:#ff4f81">Yayyyyy Khushi!</h1>
<img src="https://media.giphy.com/media/artj92V8o75VPL7AeQ/giphy.gif" style="width:280px;border-radius:20px;">
<p style="font-size:22px;color:#444;margin-top:15px;">
Thank You 💖<br>
Bhatakati Aatma 👻 ne mujhe maaf kar diya! 😆
</p>
<h2 style="margin-top:15px;color:#ff4f81">
Friendship Saved ✅
</h2>
</div>`;
}
</script>

</body>
</html>
